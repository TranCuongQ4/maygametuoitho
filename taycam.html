<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Tay Cầm Ảo - Player 2</title>
<style>
* {
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
}
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #161b22;
    font-family: Arial, sans-serif;
}
body {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 10px 20px;
}

/* Thanh trạng thái phía trên */
.header-status {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #fff;
    font-size: 14px;
    height: 40px;
    border-bottom: 1px solid #30363d;
}
.status-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    background: #ff3366;
    border-radius: 50%;
    margin-right: 5px;
}
.connected .status-dot {
    background: #00ffcc;
}

/* Khu vực nút bấm chính */
.gamepad-area {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-grow: 1;
    width: 100%;
}

/* Cụm nút di chuyển D-PAD bên trái */
.dpad {
    position: relative;
    width: 160px;
    height: 160px;
}
.dpad-btn {
    position: absolute;
    background: #21262d;
    border: 2px solid #30363d;
    color: #8b949e;
    font-weight: bold;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
.dpad-btn:active, .dpad-btn.active {
    background: #00ffcc;
    color: #000;
    border-color: #fff;
}
.dpad-up { top: 0; left: 55px; width: 50px; height: 55px; border-bottom: none; border-radius: 10px 10px 0 0; }
.dpad-down { bottom: 0; left: 55px; width: 50px; height: 55px; border-top: none; border-radius: 0 0 10px 10px; }
.dpad-left { top: 55px; left: 0; width: 55px; height: 50px; border-right: none; border-radius: 10px 0 0 10px; }
.dpad-right { top: 55px; right: 0; width: 55px; height: 50px; border-left: none; border-radius: 0 10px 10px 0; }
.dpad-center { top: 55px; left: 55px; width: 50px; height: 50px; background: #30363d; border: none; border-radius: 0; }

/* Cụm nút chức năng ở giữa (Select/Start) */
.center-controls {
    display: flex;
    flex-direction: column;
    gap: 15px;
}
.sys-btn {
    background: #21262d;
    border: 1px solid #444;
    color: #fff;
    padding: 8px 15px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 1px;
    text-align: center;
    box-shadow: 0 3px 6px rgba(0,0,0,0.2);
}
.sys-btn:active {
    background: #ffcc00;
    color: #000;
}

/* Cụm nút hành động bên phải (Chuẩn MAME/Arcade 6 nút) */
.action-buttons {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}
.action-btn {
    width: 55px;
    height: 55px;
    background: #21262d;
    border: 2px solid #444;
    color: #fff;
    border-radius: 50%;
    font-size: 18px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 8px rgba(0,0,0,0.4);
}
/* Đổi màu cụm nút cho giống máy game thùng siêu thị */
.btn-z { border-color: #ff3366; color: #ff3366; }
.btn-x { border-color: #ffcc00; color: #ffcc00; }
.btn-a { border-color: #00ffcc; color: #00ffcc; }
.btn-s { border-color: #3399ff; color: #3399ff; }
.btn-q { border-color: #9933ff; color: #9933ff; }
.btn-e { border-color: #ffffff; color: #ffffff; }

.action-btn:active {
    background: currentColor !important;
    color: #000 !important;
    box-shadow: 0 0 15px currentColor;
}

#custom-close-btn {
    position: fixed;
    top: 15px;
    right: 20px;
    z-index: 100000;
    background-color: rgba(255, 51, 102, .9);
    color: white;
    border: 1px solid rgba(255, 255, 255, .5);
    border-radius: 50%;
    width: 35px;
    height: 35px;
    font-size: 16px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}
</style>
</head>
<body>

<div id="custom-close-btn">✕</div>

<div class="header-status" id="status-bar">
    <div>🎮 VỊ TRÍ: <span style="color: #ffcc00; font-weight:bold;">TAY CẦM PLAYER 2</span></div>
    <div id="connection-text"><span class="status-dot"></span>Đang chờ máy chủ (mame.html)...</div>
</div>

<div class="gamepad-area">
    <div class="dpad">
        <div class="dpad-btn dpad-up" data-key="ArrowUp" data-code="38">▲</div>
        <div class="dpad-btn dpad-left" data-key="ArrowLeft" data-code="37">◀</div>
        <div class="dpad-btn dpad-center"></div>
        <div class="dpad-btn dpad-right" data-key="ArrowRight" data-code="39">▶</div>
        <div class="dpad-btn dpad-down" data-key="ArrowDown" data-code="40">▼</div>
    </div>

    <div class="center-controls">
        <div class="sys-btn" data-key="v" data-code="86">SELECT (NẠP THẺ)</div>
        <div class="sys-btn" data-key="Enter" data-code="13">START (CHƠI)</div>
    </div>

    <div class="action-buttons">
        <div class="action-btn btn-a" data-key="a" data-code="65">X</div>
        <div class="action-btn btn-s" data-key="s" data-code="83">Y</div>
        <div class="action-btn btn-q" data-key="q" data-code="81">L1</div>
        <div class="action-btn btn-z" data-key="z" data-code="90">A</div>
        <div class="action-btn btn-x" data-key="x" data-code="88">B</div>
        <div class="action-btn btn-e" data-key="e" data-code="69">R1</div>
    </div>
</div>

<script>
const statusBar = document.getElementById("status-bar");
const connectionText = document.getElementById("connection-text");

// Tự động kiểm tra luồng kết nối liên kết cửa sổ (nếu mở dạng Popup từ trang mame.html)
if (window.opener) {
    statusBar.classList.add("connected");
    connectionText.innerHTML = '<span class="status-dot"></span>Đã liên kết link mẹ thành công!';
}

// Hàm gửi lệnh phím bấm đồng bộ chuẩn mã EmulatorJS sang máy chủ
function sendInput(type, key, code) {
    const payload = {
        sender: "EmulatorJS_P2",
        type: type, // "keydown" hoặc "keyup"
        key: key,
        keyCode: parseInt(code)
    };

    // Cách 1: Gửi qua luồng cửa sổ liên kết trực tiếp (nếu mở tab song song)
    if (window.opener) {
        window.opener.postMessage(payload, "*");
    }
    
    // Cách 2: Phát quảng bá qua BroadcastChannel (Đề phòng chạy đa thiết bị cục bộ chung mạng)
    const channel = new BroadcastChannel('emulatorjs_p2_channel');
    channel.postMessage(payload);
    channel.close();
}

// Lắng nghe sự kiện chạm tay vào màn hình cảm ứng (Hỗ trợ đa điểm mượt mà)
const activeButtons = new Set();

function handleTouch(e) {
    const currentTouches = new Set();
    
    // Quét qua toàn bộ danh sách các ngón tay đang chạm trên màn hình
    for (let i = 0; i < e.touches.length; i++) {
        const touch = e.touches[i];
        const element = document.elementFromPoint(touch.clientX, touch.clientY);
        
        if (element && (element.classList.contains('dpad-btn') || element.classList.contains('action-btn') || element.classList.contains('sys-btn'))) {
            const key = element.getAttribute('data-key');
            if (key) {
                currentTouches.add(element);
            }
        }
    }
    
    // Nhả các nút không còn được chạm
    activeButtons.forEach(btn => {
        if (!currentTouches.has(btn)) {
            btn.classList.remove('active');
            sendInput("keyup", btn.getAttribute('data-key'), btn.getAttribute('data-code'));
            activeButtons.delete(btn);
        }
    });
    
    // Kích hoạt các nút mới được chạm vào
    currentTouches.forEach(btn => {
        if (!activeButtons.has(btn)) {
            btn.classList.add('active');
            sendInput("keydown", btn.getAttribute('data-key'), btn.getAttribute('data-code'));
            activeButtons.add(btn);
        }
    });
}

window.addEventListener('touchstart', handleTouch, { passive: false });
window.addEventListener('touchmove', handleTouch, { passive: false });
window.addEventListener('touchend', handleTouch, { passive: false });
window.addEventListener('touchcancel', handleTouch, { passive: false });

// Nút tắt thoát trang nhanh
document.getElementById("custom-close-btn").addEventListener("click", () => {
    window.close();
});

// Chặn zoom màn hình khi bấm nút liên tục trên điện thoại
document.documentElement.addEventListener('touchstart', function (e) {
    if (e.touches.length > 1) {
        e.preventDefault();
    }
}, { passive: false });
</script>
</body>
</html>
