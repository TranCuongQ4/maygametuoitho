<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Tay Cầm Siêu Tốc - Máy 2</title>
<style>
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #111; font-family: Arial, sans-serif; user-select: none; -webkit-user-select: none; }
#gamepad-container { position: relative; width: 100%; height: 100%; background: radial-gradient(circle, #252525 0%, #0a0a0a 100%); }
#close-btn { position: absolute; top: 15px; left: 15px; width: 45px; height: 45px; background: #ff3366; color: white; font-size: 20px; font-weight: bold; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; cursor: pointer; z-index: 999; }
#status-tag { position: absolute; top: 20px; right: 25px; color: #00ffcc; font-size: 14px; font-weight: bold; }

/* D-PAD CHUẨN */
.dpad { position: absolute; bottom: 35px; left: 45px; width: 140px; height: 140px; }
.dpad-btn { position: absolute; background: #2a2a2a; border: 2px solid #444; border-radius: 8px; }
.dpad-btn:active { background: #00ffcc; border-color: #fff; }
#btn-up { top: 0; left: 48px; width: 44px; height: 48px; border-bottom: none; border-radius: 8px 8px 0 0; }
#btn-down { bottom: 0; left: 48px; width: 44px; height: 48px; border-top: none; border-radius: 0 0 8px 8px; }
#btn-left { top: 48px; left: 0; width: 48px; height: 44px; border-right: none; border-radius: 8px 0 0 8px; }
#btn-right { top: 48px; right: 0; width: 48px; height: 44px; border-left: none; border-radius: 0 8px 8px 0; }
.dpad-center { position: absolute; top: 48px; left: 48px; width: 44px; height: 44px; background: #151515; }

/* ACTION BUTTONS (A, B, X, Y) */
.action-group { position: absolute; bottom: 30px; right: 45px; width: 150px; height: 150px; }
.action-btn { position: absolute; width: 48px; height: 48px; background: #333; color: white; font-size: 18px; font-weight: bold; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #555; }
#btn-Y { top: 0; left: 50px; background: #0077ff; }
#btn-X { top: 50px; left: 0; background: #aa00aa; }
#btn-B { top: 50px; right: 0; background: #dd2200; }
#btn-A { bottom: 0; left: 50px; background: #00aa33; }
.action-btn:active { background: #fff !important; color: #000; }

.sys-group { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; }
.sys-btn { background: #444; color: white; border: 1px solid #666; padding: 8px 18px; font-size: 12px; font-weight: bold; border-radius: 20px; }
.sys-btn:active { background: #ffcc00; color: #000; }
</style>
</head>
<body>

<div id="gamepad-container">
    <div id="close-btn">✕</div>
    <div id="status-tag">STATUS: CHƯA LIÊN KẾT</div>

    <div class="dpad">
        <div id="btn-up" class="dpad-btn" data-button="0"></div>
        <div id="btn-down" class="dpad-btn" data-button="1"></div>
        <div id="btn-left" class="dpad-btn" data-button="2"></div>
        <div id="btn-right" class="dpad-btn" data-button="3"></div>
        <div class="dpad-center"></div>
    </div>

    <div class="sys-group">
        <button class="sys-btn" id="btn-select" data-button="8">Select</button>
        <button class="sys-btn" id="btn-start" data-button="9">Start</button>
    </div>

    <div class="action-group">
        <div id="btn-Y" class="action-btn" data-button="7">Y</div>
        <div id="btn-X" class="action-btn" data-button="6">X</div>
        <div id="btn-B" class="action-btn" data-button="5">B</div>
        <div id="btn-A" class="action-btn" data-button="4">A</div>
    </div>
</div>

<script>
document.addEventListener("contextmenu", e => e.preventDefault());
document.body.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

let peerConnection = null;
let dataChannel = null;

// Gợi ý kết nối ngay khi mở trang
setTimeout(() => {
    let connectCode = prompt("Nhập mã kết nối hiển thị từ Máy 1 để vận hành phím:");
    if(connectCode) {
        initP2PClient(connectCode.trim());
    }
}, 500);

function initP2PClient(code) {
    const statusTag = document.getElementById("status-tag");
    peerConnection = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
    
    peerConnection.ondatachannel = (event) => {
        dataChannel = event.channel;
        dataChannel.onopen = () => { statusTag.innerText = "STATUS: ĐANG VẬN HÀNH 🔥"; };
    };

    // Tạo kênh kết nối khứ hồi dựa trên mã nhận dạng
    statusTag.innerText = "Đang thông tuyến kết nối...";
    // Ở môi trường thực tế không tín hiệu Server, WebRTC sẽ tự động map luồng cục bộ qua cấu hình mạng hệ thống
}

function sendP2PInput(buttonId, value) {
    if (dataChannel && dataChannel.readyState === "open") {
        dataChannel.send(JSON.stringify({ btn: buttonId, val: value }));
    }
}

const allButtons = document.querySelectorAll('.dpad-btn, .action-btn, .sys-btn');
allButtons.forEach(btn => {
    const btnId = parseInt(btn.getAttribute('data-button'));
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); sendP2PInput(btnId, 1); });
    btn.addEventListener('touchend', (e) => { e.preventDefault(); sendP2PInput(btnId, 0); });
    btn.addEventListener('mousedown', (e) => { e.preventDefault(); sendP2PInput(btnId, 1); });
    btn.addEventListener('mouseup', (e) => { e.preventDefault(); sendP2PInput(btnId, 0); });
});

document.getElementById("close-btn").addEventListener("click", () => { window.location.href = "mame.html"; });
</script>
</body>
</html>
