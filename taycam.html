<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Tay Cầm Phụ - Máy 2</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000000;
    font-family: 'Segoe UI', Arial, sans-serif;
    user-select: none;
    -webkit-user-select: none;
}

#gamepad-container {
    position: relative;
    width: 100%; height: 100%;
    background: #151515;
}

#close-btn {
    position: absolute;
    top: 15px; left: 15px;
    width: 45px; height: 45px;
    background: #ff3366;
    color: white;
    font-size: 22px; font-weight: bold;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid #fff;
    cursor: pointer; z-index: 999;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    touch-action: none;
}

#room-tag {
    position: absolute;
    top: 15px; right: 20px;
    color: rgba(255,255,204,0.4);
    font-size: 13px; font-weight: bold;
}

/* CỤM D-PAD CHUẨN ĐẸP */
.dpad {
    position: absolute;
    bottom: 35px; left: 45px;
    width: 130px; height: 130px;
}
.dpad-btn {
    position: absolute;
    background: #252525;
    border: 1px solid #3c3c3c;
}
.dpad-btn:active { background: #800000; border-color: #ff3333; }

#btn-up { top: 0; left: 44px; width: 42px; height: 46px; border-radius: 6px 6px 0 0; }
#btn-down { bottom: 0; left: 44px; width: 42px; height: 46px; border-radius: 0 0 6px 6px; }
#btn-left { top: 44px; left: 0; width: 46px; height: 42px; border-radius: 6px 0 0 6px; }
#btn-right { top: 44px; right: 0; width: 46px; height: 42px; border-radius: 0 6px 6px 0; }
.dpad-center { position: absolute; top: 44px; left: 44px; width: 42px; height: 42px; background: #1a1a1a; }

/* CỤM NÚT BẤM ĐIỀU KHIỂN CHUẨN EMULATORJS (X Y A B) */
.action-group {
    position: absolute;
    bottom: 35px; right: 45px;
    width: 140px; height: 140px;
}
.action-btn {
    position: absolute;
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.1);
    color: #e0e0e0;
    font-size: 18px; font-weight: bold;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid rgba(255,255,255,0.2);
    box-shadow: 0 3px 6px rgba(0,0,0,0.4);
}
.action-btn:active { background: #ffffff !important; color: #000000 !important; }

#btn-Y { top: 0; left: 48px; }
#btn-X { top: 48px; left: 0; }
#btn-B { top: 48px; right: 0; }
#btn-A { bottom: 0; left: 48px; }

/* CỤM NÚT CHỨC NĂNG Ở GIỮA DƯỚI (SELECT / START) */
.sys-group {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 10px;
}
.sys-btn {
    background: #252525;
    color: #b0b0b0;
    border: 1px solid #3c3c3c;
    padding: 6px 14px;
    font-size: 11px; font-weight: bold;
    border-radius: 4px;
}
.sys-btn:active { background: #ffcc00; color: #000; }

/* CỤM PHÍM PHỤ FAST / SLOW CHUẨN EMULATORJS Ở ĐÁY MÀN HÌNH */
.speed-group {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 40px;
}
.speed-btn {
    background: #202020;
    color: #8a8a8a;
    border: 1px solid #2d2d2d;
    padding: 4px 18px;
    font-size: 10px;
    border-radius: 4px;
}
.speed-btn:active { background: #fff; color: #000; }
</style>
</head>
<body>

<div id="gamepad-container">
    
    <div id="close-btn">✕</div>
    <div id="room-tag">TAY CẦM PHỤ - PHÒNG: <span id="room-id-text">0000</span></div>

    <div class="dpad">
        <div id="btn-up" class="dpad-btn" data-button="0"></div>
        <div id="btn-down" class="dpad-btn" data-button="1"></div>
        <div id="btn-left" class="dpad-btn" data-button="2"></div>
        <div id="btn-right" class="dpad-btn" data-button="3"></div>
        <div class="dpad-center"></div>
    </div>

    <div class="sys-group">
        <button class="sys-btn" id="btn-select" data-button="10">Select</button>
        <button class="sys-btn" id="btn-start" data-button="11">Start</button>
    </div>

    <div class="action-group">
        <div id="btn-Y" class="action-btn" data-button="7">Y</div>
        <div id="btn-X" class="action-btn" data-button="6">X</div>
        <div id="btn-B" class="action-btn" data-button="5">B</div>
        <div id="btn-A" class="action-btn" data-button="4">A</div>
    </div>

    <div class="speed-group">
        <button class="speed-btn" id="btn-fast" data-button="12">Fast</button>
        <button class="speed-btn" id="btn-slow" data-button="13">Slow</button>
    </div>

</div>

<script>
const firebaseConfig = {
    databaseURL: "https://cuongdata-default-rtdb.asia-southeast1.firebasedatabase.app"
};
if (firebase.apps.length === 0) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const urlParams = new URLSearchParams(window.location.search);
const roomId = urlParams.get('room') || "1111";
document.getElementById("room-id-text").innerText = roomId;

document.addEventListener("contextmenu", e => e.preventDefault());
document.body.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

// HÀM UPDATE TRỰC TIẾP GIÁ TRỊ NÚT BẤM (0 HOẶC 1) VÀO NODE FIREBASE CỐ ĐỊNH
function sendInputToFirebase(buttonId, value) {
    const dataUpdate = {};
    dataUpdate[buttonId] = value;
    db.ref("gamepads/" + roomId).update(dataUpdate);
}

const allButtons = document.querySelectorAll('.dpad-btn, .action-btn, .sys-btn, .speed-btn');

allButtons.forEach(btn => {
    const btnId = btn.getAttribute('data-button');
    
    // ĐIỆN THOẠI (TOUCH)
    btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        sendInputToFirebase(btnId, 1);
    });
    btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        sendInputToFirebase(btnId, 0);
    });

    // MÁY TÍNH (MOUSE)
    btn.addEventListener('mousedown', (e) => {
        e.preventDefault();
        sendInputToFirebase(btnId, 1);
    });
    btn.addEventListener('mouseup', (e) => {
        e.preventDefault();
        sendInputToFirebase(btnId, 0);
    });
});

function makeElementDraggable(element) {
    let isDragging = false;
    let startX, startY, startLeft, startTop, hasMoved = false;

    element.addEventListener("touchstart", (e) => {
        isDragging = true;
        hasMoved = false;
        const touch = e.touches[0];
        startX = touch.clientX;
        startY = touch.clientY;
        const rect = element.getBoundingClientRect();
        startLeft = rect.left;
        startTop = rect.top;
    }, {passive: true});

    element.addEventListener("touchmove", (e) => {
        if (!isDragging) return;
        const touch = e.touches[0];
        const dx = touch.clientX - startX;
        const dy = touch.clientY - startY;

        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) { hasMoved = true; }

        if (hasMoved) {
            let newLeft = startLeft + dx;
            let newTop = startTop + dy;
            newLeft = Math.max(5, Math.min(window.innerWidth - element.offsetWidth - 5, newLeft));
            newTop = Math.max(5, Math.min(window.innerHeight - element.offsetHeight - 5, newTop));
            element.style.left = newLeft + "px";
            element.style.top = newTop + "px";
        }
    });

    element.addEventListener("touchend", () => {
        isDragging = false;
        if (!hasMoved) {
            window.location.href = "mame.html";
        }
    });
}

makeElementDraggable(document.getElementById("close-btn"));
</script>
</body>
</html>
