<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Tay Cầm Ảo PeerJS - SNES Player 2</title>
<style>
* { box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none; }
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #161b22; font-family: Arial, sans-serif; }
body { display: flex; flex-direction: column; justify-content: space-between; padding: 5px 15px; }

.header-status { width: 100%; display: flex; justify-content: space-between; align-items: center; color: #fff; font-size: 13px; height: 35px; border-bottom: 1px solid #30363d; }
.status-dot { display: inline-block; width: 10px; height: 10px; background: #ff3366; border-radius: 50%; margin-right: 5px; }
.connected .status-dot { background: #00ffcc; box-shadow: 0 0 8px #00ffcc; }

/* Cụm vai L và R nằm trên cùng */
.shoulder-area { display: flex; justify-content: space-between; width: 100%; padding: 0 10px; margin-top: 2px; }
.shoulder-btn { width: 90px; height: 35px; background: #28303d; border: 2px solid #444; color: #fff; font-weight: bold; border-radius: 15px 15px 5px 5px; display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 3px 6px rgba(0,0,0,0.3); }
.shoulder-btn:active, .shoulder-btn.active { background: #00ffcc; color: #000; border-color: #fff; }

.gamepad-area { display: flex; justify-content: space-between; align-items: center; flex-grow: 1; width: 100%; margin-top: 5px; }

/* DPAD DI CHUYỂN CHUẨN MAME PLAYER 2 (Lên: up arrow, Xuống: down arrow, Trái: left arrow, Phải: right arrow) */
.dpad { position: relative; width: 150px; height: 150px; }
.dpad-btn { position: absolute; background: #21262d; border: 2px solid #30363d; color: #8b949e; font-weight: bold; font-size: 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
.dpad-btn:active, .dpad-btn.active { background: #00ffcc; color: #000; border-color: #fff; box-shadow: 0 0 12px #00ffcc; }
.dpad-up { top: 0; left: 50px; width: 50px; height: 55px; border-radius: 8px 8px 0 0; }
.dpad-down { bottom: 0; left: 50px; width: 50px; height: 55px; border-radius: 0 0 8px 8px; }
.dpad-left { top: 50px; left: 0; width: 55px; height: 50px; border-radius: 8px 0 0 8px; }
.dpad-right { top: 50px; right: 0; width: 55px; height: 50px; border-radius: 0 8px 8px 0; }
.dpad-center { top: 50px; left: 50px; width: 50px; height: 50px; background: #30363d; border: none; }

/* HỆ THỐNG ĐIỀU KHIỂN TRUNG TÂM (SELECT = v, START = enter) */
.center-controls { display: flex; flex-direction: column; gap: 8px; align-items: center; }
.sys-btn { background: #21262d; border: 1px solid #444; color: #fff; padding: 6px 14px; border-radius: 15px; font-size: 11px; font-weight: bold; text-align: center; box-shadow: 0 3px 6px rgba(0,0,0,0.2); width: 90px; }
.sys-btn:active, .sys-btn.active { background: #ffcc00; color: #000; }
.btn-scan { background: #ff3366; color: #fff; font-weight: bold; border: 1px solid #fff; width: 100px; padding: 8px 10px; border-radius: 6px; }

/* CỤM NÚT HÀNH ĐỘNG HÌNH KIM CƯƠNG CHUẨN SNES (B=x, Y=s, A=z, X=a) */
.snes-diamond { position: relative; width: 150px; height: 150px; }
.action-btn { position: absolute; width: 48px; height: 48px; background: #21262d; border: 2px solid #444; color: #fff; border-radius: 50%; font-size: 16px; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
.action-btn:active, .action-btn.active { background: currentColor !important; color: #000 !important; box-shadow: 0 0 15px currentColor; border-color: #fff !important; }

/* Định vị nút theo form kim cương SNES */
.btn-x { top: 0; left: 51px; border-color: #3399ff; color: #3399ff; }   /* Nút X nằm TRÊN */
.btn-y { top: 51px; left: 0; border-color: #9933ff; color: #9933ff; }   /* Nút Y nằm TRÁI */
.btn-a { top: 51px; right: 0; border-color: #ff3366; color: #ff3366; }  /* Nút A nằm PHẢI */
.btn-b { bottom: 0; left: 51px; border-color: #ffcc00; color: #ffcc00; } /* Nút B nằm DƯỚI */

/* KHU VỰC CAMERA QUÉT */
#camera-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 99999; flex-direction: column; justify-content: center; align-items: center; }
#reader { width: 260px; height: 260px; background: #000; border: 2px solid #00ffcc; border-radius: 8px; overflow: hidden; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

<div class="header-status" id="status-bar">
    <div>🎮 THIẾT BỊ: <span style="color: #ffcc00; font-weight:bold;">TAY CẦM P2 (SNES)</span></div>
    <div id="status-text"><span class="status-dot"></span>Chưa kết nối. Nhấn nút đỏ quét QR!</div>
</div>

<div class="shoulder-area">
    <div class="shoulder-btn" data-key="q" data-code="KeyQ">L</div>
    <div class="shoulder-btn" data-key="e" data-code="KeyE">R</div>
</div>

<div class="gamepad-area">
    <div class="dpad">
        <div class="dpad-btn dpad-up" data-key="ArrowUp" data-code="ArrowUp">▲</div>
        <div class="dpad-btn dpad-left" data-key="ArrowLeft" data-code="ArrowLeft">◀</div>
        <div class="dpad-btn dpad-center"></div>
        <div class="dpad-btn dpad-right" data-key="ArrowRight" data-code="ArrowRight">▶</div>
        <div class="dpad-btn dpad-down" data-key="ArrowDown" data-code="ArrowDown">▼</div>
    </div>

    <div class="center-controls">
        <button class="btn-scan" onclick="moCameraQuet()">📷 QUÉT QR</button>
        <div class="sys-btn" data-key="v" data-code="KeyV" style="margin-top: 5px;">SELECT (COIN)</div>
        <div class="sys-btn" data-key="Enter" data-code="Enter">START</div>
    </div>

    <div class="snes-diamond">
        <div class="action-btn btn-x" data-key="a" data-code="KeyA">X</div>
        <div class="action-btn btn-y" data-key="s" data-code="KeyS">Y</div>
        <div class="action-btn btn-a" data-key="z" data-code="KeyZ">A</div>
        <div class="action-btn btn-b" data-key="x" data-code="KeyX">B</div>
    </div>
</div>

<div id="camera-overlay">
    <div style="color: #00ffcc; margin-bottom: 15px; font-weight: bold;">ĐƯA CAMERA VÀO MÃ QR TRÊN PC</div>
    <div id="reader"></div>
    <div class="sys-btn" style="margin-top: 20px; background: #ff3366; width: 120px; padding: 10px;" onclick="dongCameraQuet()">ĐÓNG LẠI</div>
</div>

<script>
let peer = null;
let conn = null;
let html5QrcodeScanner = null;

function moCameraQuet() {
    document.getElementById("camera-overlay").style.display = "flex";
    html5QrcodeScanner = new Html5Qrcode("reader");
    html5QrcodeScanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 200, height: 200 } },
        (qrText) => {
            dongCameraQuet();
            ketNoiMayChuPeerJS(qrText.trim());
        },
        () => {}
    ).catch(() => {
        alert("Không mở được camera. Hãy cấp quyền truy cập camera cho trình duyệt!");
        dongCameraQuet();
    });
}

function dongCameraQuet() {
    document.getElementById("camera-overlay").style.display = "none";
    if (html5QrcodeScanner) {
        html5QrcodeScanner.stop().catch(()=>{});
    }
}

function ketNoiMayChuPeerJS(roomId) {
    const statusBar = document.getElementById("status-bar");
    const statusText = document.getElementById("status-text");
    
    statusText.innerText = `Đang kết nối đến mã phòng: ${roomId}...`;

    if (peer) {
        peer.destroy();
    }

    // Khởi tạo đối tượng khách PeerJS
    peer = new Peer({
        config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
    });

    peer.on('open', function() {
        // Thực hiện cuộc gọi kết nối trực tiếp Data Channel đến ID phòng của PC
        conn = peer.connect(`trancuong_mame_${roomId}`);

        conn.on('open', function() {
            statusBar.classList.add("connected");
            statusText.innerHTML = "<span class='status-dot'></span>KẾT NỐI TAY CẦM THÀNH CÔNG!";
        });

        conn.on('close', function() {
            statusBar.classList.remove("connected");
            statusText.innerText = "❌ Mất kết nối. Vui lòng quét lại.";
        });

        conn.on('error', function(err) {
            statusText.innerText = "❌ Lỗi đường truyền mạng.";
        });
    });

    peer.on('error', function(err) {
        statusText.innerText = "❌ Không tìm thấy phòng PC này.";
    });
}

function guiLenhPhim(type, key, code) {
    if (conn && conn.open) {
        conn.send({
            sender: "EmulatorJS_P2",
            type: type,
            key: key,
            code: code
        });
    }
}

// HỆ THỐNG XỬ LÝ CẢM ỨNG ĐA ĐIỂM (MULTI-TOUCH)
const activeButtons = new Set();
function handleTouch(e) {
    const currentTouches = new Set();
    for (let i = 0; i < e.touches.length; i++) {
        const touch = e.touches[i];
        const element = document.elementFromPoint(touch.clientX, touch.clientY);
        if (element && (element.classList.contains('dpad-btn') || element.classList.contains('action-btn') || element.classList.contains('sys-btn') || element.classList.contains('shoulder-btn'))) {
            if (element.getAttribute('data-key')) currentTouches.add(element);
        }
    }
    activeButtons.forEach(btn => {
        if (!currentTouches.has(btn)) {
            btn.classList.remove('active');
            guiLenhPhim("keyup", btn.getAttribute('data-key'), btn.getAttribute('data-code'));
            activeButtons.delete(btn);
        }
    });
    currentTouches.forEach(btn => {
        if (!activeButtons.has(btn)) {
            btn.classList.add('active');
            guiLenhPhim("keydown", btn.getAttribute('data-key'), btn.getAttribute('data-code'));
            activeButtons.add(btn);
        }
    });
}

window.addEventListener('touchstart', handleTouch, { passive: false });
window.addEventListener('touchmove', handleTouch, { passive: false });
window.addEventListener('touchend', handleTouch, { passive: false });
window.addEventListener('touchcancel', handleTouch, { passive: false });

document.documentElement.addEventListener('touchstart', function (e) {
    if (e.touches.length > 1) e.preventDefault();
}, { passive: false });
</script>
</body>
</html>
