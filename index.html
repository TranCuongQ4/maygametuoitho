<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kho Game Tuổi Thơ - NES & SNES Mobile</title>
    <link rel="icon" href="data:,">
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #121212; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #fff; overflow: hidden; touch-action: none; }
        #menu-container { width: 100%; height: 100%; box-sizing: border-box; padding: 20px 20px 40px 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; position: relative; }
        h1 { color: #ffcc00; font-size: 26px; margin-bottom: 5px; text-shadow: 2px 2px #000; }
        p { color: #aaa; font-size: 14px; margin-top: 0; margin-bottom: 20px; }
        .section-title { margin-top: 15px; font-size: 16px; font-weight: bold; color: #00ffcc; letter-spacing: 1px; text-transform: uppercase; }
        .btn { background: linear-gradient(145deg, #2a2a2a, #222); color: white; border: 1px solid #444; padding: 14px 20px; margin: 6px 0; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; width: 90%; max-width: 340px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.1s ease; -webkit-tap-highlight-color: transparent; }
        .btn:active { transform: scale(0.98); background: #ffcc00; color: #000; border-color: #fff; }
        #file-input { display: none; }
        .btn-hd { background: linear-gradient(145deg, #0f2b46, #0a1c2e); border: 1px solid #00ffcc; color: #00ffcc; }
        .footer-credits { color: #ffcc00; font-size: 12px; margin-top: 25px; margin-bottom: 10px; text-align: center; letter-spacing: 0.5px; opacity: 0.9; }
        #game-box { width: 100%; height: 100%; display: none; position: absolute; top: 0; left: 0; z-index: 9999; background-color: #000; }
        #emulator { width: 100%; height: 100%; }
        #custom-close-btn { position: absolute; top: 15px; left: 15px; z-index: 100000; background-color: rgba(255, 51, 102, 0.75); color: white; border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 50%; width: 44px; height: 44px; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); touch-action: none; user-select: none; }
        .rotate-hint { color: #ff3366; font-size: 13px; margin-top: 5px; font-weight: bold; display: none; }
        @media screen and (orientation: portrait) { .rotate-hint { display: block; } }
    </style>
</head>
<body>
    <div id="menu-container">
        <h1>🎮 KHO GAME TUỔI THƠ </h1>
        <p>Hệ máy NES & SNES kỉ niệm tuổi thơ</p>
        <div class="rotate-hint">🔄 Hãy xoay ngang điện thoại để chơi game tốt nhất!</div>
        <div class="section-title">ーーー Game NES (4 Nút) ーーー</div>
        <button class="btn" onclick="loadGame('fceumm', 'roms/150-in-1.nes')">🎮 150-in-1 (Bản tổng hợp)</button>
        <button class="btn" onclick="loadGame('fceumm', 'roms/1200-in-1.nes')">🎮 1200-in-1 (Bản tổng hợp)</button>
        <div class="section-title">ーーー Game SNES (6 Nút) ーーー</div>
        <button class="btn" onclick="loadGame('snes9x', 'roms/Aladdin (USA).sfc')">🧞 Aladdin (USA)</button>
        <button class="btn" onclick="loadGame('snes9x', 'roms/Final Fight 3 (USA).sfc')">👊 Final Fight 3 (USA)</button>
        <button class="btn" onclick="loadGame('snes9x', 'roms/International Superstar Soccer (USA).sfc')">⚽ Siêu Sao Bóng Đá</button>
        <button class="btn" onclick="loadGame('snes9x', 'roms/Biker Mice from Mars (USA).sfc')">🏍️ Đua Xe Chuột MODO Harley</button>
        <button class="btn" onclick="loadGame('snes9x', 'roms/Side Pocket (USA).sfc')">🎱 Side Pocket (Bida Lỗ)</button>
        <button class="btn" onclick="loadGame('snes9x', 'roms/Street Fighter II Turbo (V1.0) (E) [!].smc')">🥋 Street Fighter II Turbo</button>
        <button class="btn" onclick="loadGame('snes9x', 'roms/Super Bomberman 4 (Japan).sfc')">💣 Super Bomberman 4</button>
        <button class="btn" onclick="loadGame('snes9x', 'roms/Super Double Dragon (USA).sfc')">🐲 Super Double Dragon</button>
        <div class="section-title">ーーー Tùy chọn khác ーーー</div>
        <label for="file-input" class="btn" style="display: block; text-align: center; box-sizing: border-box;">📁 Tự nạp file ROM từ máy</label>
        <input type="file" id="file-input" accept=".nes,.sfc,.smc,.zip">
        <button class="btn btn-hd" onclick="xemHuongDan()">📖 Hướng Dẫn Sử Dụng</button>
        <div class="footer-credits">Thiết Kế Trần Cường - Zalo: 0907860662</div>
    </div>
    <div id="game-box">
        <div id="custom-close-btn">✕</div>
        <div id="emulator"></div>
    </div>
    <script src="huongdan.js"></script>
    <script>
        function loadGame(system, romUrl) { startEmulator(system, romUrl); }
        document.getElementById('file-input').addEventListener('change', function(e) {
            var file = e.target.files[0]; if (!file) return;
            var ext = file.name.split('.').pop().toLowerCase();
            var system = (ext === 'nes') ? 'fceumm' : 'snes9x';
            startEmulator(system, URL.createObjectURL(file));
        });

        function startEmulator(coreType, url) {
            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('game-box').style.display = 'block';

            window.EJS_player = '#emulator';
            window.EJS_core = coreType;
            window.EJS_gameUrl = url;
            window.EJS_pathtodata = 'data/';
            window.EJS_corePath = 'data/cores/';
            window.EJS_language = 'en';
            
            // THÊM 3 DÒNG NÀY ĐỂ ÉP GAME CHẠY TỰ ĐỘNG
            window.EJS_startOnLoaded = true;
            window.EJS_onGameStart = function() {
                console.log("Game đã bắt đầu!");
            };

            var script = document.createElement('script');
            script.src = "data/loader.js";
            document.head.appendChild(script);
        }

        function forceCloseGame() { window.location.reload(); }
        document.getElementById('custom-close-btn').addEventListener('click', forceCloseGame);
    </script>
	
	<script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((reg) => console.log('Service Worker đã sẵn sàng!'))
                    .catch((err) => console.log('Lỗi Service Worker:', err));
            });
        }
    </script>
	
	
</body>
</html>
