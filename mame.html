<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Trò Chơi Game Thùng - P2P Receiver</title>
<style>
html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:#121212; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; color:#fff;
}
#menu-container{
    width:100%; height:100%; box-sizing:border-box; padding:20px;
    overflow-y:auto; display:flex; flex-direction:column; align-items:center;
}
h1{ color:#ffcc00; font-size:26px; margin-bottom:5px; text-shadow:2px 2px #000; text-align:center; }
.subtitle{ color:#aaa; font-size:14px; margin-bottom:20px; }
.btn{
    background:linear-gradient(145deg,#2a2a2a,#222); color:white; border:1px solid #444;
    padding:14px 20px; margin:6px 0; border-radius:10px; cursor:pointer; font-size:16px;
    font-weight:bold; width:90%; max-width:340px; box-shadow:0 4px 6px rgba(0,0,0,.3);
    transition:all .1s ease; text-align:center; -webkit-tap-highlight-color:transparent;
}
.btn:active{ transform:scale(.98); background:#ffcc00; color:#000; border-color:#fff; }
.btn-back{ background:linear-gradient(145deg,#0f2b46,#0a1c2e); border:1px solid #00ffcc; color:#00ffcc; }
.btn-p2p { background: linear-gradient(145deg, #00cc44, #009933); border: 2px solid #fff; color: #fff; }
#romInput{ display:none; }
.footer{ color:#ffcc00; font-size:12px; margin-top:25px; text-align:center; }
#game-box{ width:100%; height:100%; display:none; position:fixed; top:0; left:0; z-index:9999; background:#000; }
#emulator{ width:100%; height:100%; }
#custom-close-btn{
    position:fixed; top:20px; left:20px; z-index:100000; background-color:rgba(255,51,102,.9);
    color:white; border:2px solid rgba(255,255,255,.5); border-radius:50%; width:50px; height:50px;
    font-size:24px; font-weight:bold; display:flex; align-items:center; justify-content:center;
    cursor:pointer; user-select:none; touch-action:none; box-shadow:0 4px 15px rgba(0,0,0,.5);
}
#p2p-status {
    background: rgba(0, 0, 0, 0.6); padding: 10px; border-radius: 8px; color: #ffcc00;
    font-size: 13px; margin-bottom: 15px; border: 1px dashed #ffcc00; width: 85%; max-width: 320px; text-align: center;
}
</style>
</head>
<body>

<div id="menu-container">
    <h1>🕹️ GAME THÙNG SIÊU TỐC 🕹️</h1>
    <div class="subtitle">Kết Nối Trực Tiếp Không Độ Trễ</div>

    <div id="p2p-status">Trạng thái kết nối: Sẵn sàng vận hành</div>
    
    <button class="btn btn-p2p" onclick="setupP2PConnection()">🎮 KÍCH HOẠT VẬN HÀNH TAY CẦM PHỤ 🎮</button>
    <button class="btn btn-back" onclick="window.location.href='index.html'">← Trở Về Game Băng Đĩa</button>

    <button class="btn" onclick="askPlayMode('roms/dino.zip')">⚜ Trò Bộ Đội Nổi Tiếng ⚜</button>
    <button class="btn" onclick="askPlayMode('roms/knights.zip')">⚜ Knights of the Round ⚜</button>
    <button class="btn" onclick="askPlayMode('roms/wof.zip')">⚜ Tam Quốc Chí 2 ⚜</button>
    <button class="btn" onclick="askPlayMode('roms/sf2.zip')">⚜ Street Fighter II ⚜</button>

    <div class="footer">Thiết Kế Trần Cường - Zalo: 0907860662</div>
</div>

<div id="game-box">
    <div id="custom-close-btn">✕</div>
    <div id="emulator-container" style="width:100%;height:100%;">
        <div id="emulator"></div>
    </div>
</div>

<script>
let isLoaderScriptLoaded = false;
let peerConnection = null;
let dataChannel = null;

// Khởi tạo cấu hình ICE Server mặc định của Google để tự tìm địa chỉ IP kết nối trực tiếp 2 máy
const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

function setupP2PConnection() {
    const statusDiv = document.getElementById("p2p-status");
    peerConnection = new RTCPeerConnection(rtcConfig);
    
    // Tạo kênh truyền dữ liệu siêu tốc độ dữ liệu thô (Dùng UDP)
    dataChannel = peerConnection.createDataChannel("gamepadChannel", { ordered: false, maxRetransmits: 0 });
    
    dataChannel.onopen = () => { statusDiv.innerHTML = "🟢 <b>ĐÃ KẾT NỐI TAY CẦM TRỰC TIẾP!</b>"; };
    dataChannel.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if(data && window.EJS_emulator && window.EJS_emulator.api) {
            try {
                // Nhồi trực tiếp phím từ Máy 2 vào core EmulatorJS P2 lập tức
                window.EJS_emulator.api.setGamepadState(1, data.btn, data.val);
            } catch(e){}
        }
    };

    peerConnection.onicecandidate = (e) => {
        if (e.candidate == null) {
            // Sau khi gom đủ mã cấu hình định danh, hiển thị mã để nhập sang máy tay cầm
            const offerB64 = btoa(JSON.stringify(peerConnection.localDescription));
            let shortCode = offerB64.substring(offerB64.length - 12, offerB64.length - 4).toUpperCase();
            prompt("HÃY SAO CHÉP MÃ SỐ KẾT NỐI NÀY VÀ NHẬP VÀO MÁY TAY CẦM PHỤ:", shortCode);
            statusDiv.innerText = "Chờ máy phụ nhập mã để thông kết nối...";
        }
    };

    peerConnection.createOffer().then(offer => peerConnection.setLocalDescription(offer));
}

function askPlayMode(romUrl, romName = "") {
    startGame(romUrl, romName);
}

function startGame(romUrl, romName = ""){
    document.getElementById("menu-container").style.display="none";
    document.getElementById("game-box").style.display="block";
    const container = document.getElementById("emulator-container");
    container.innerHTML = '<div id="emulator"></div>';

    window.EJS_player = "#emulator";
    window.EJS_core = "arcade";
    window.EJS_gameUrl = romUrl;
    if(romName !== "") window.EJS_gameName = romName;

    window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
    window.EJS_corePath = "https://cdn.emulatorjs.org/stable/data/cores/";
    window.EJS_language = "en";
    window.EJS_startOnLoaded = true;
    window.EJS_players = 2;
    window.EJS_maxPlayers = 2;
    window.EJS_gamepad = true;

    window.EJS_onGameStart = function() {
        if (window.EJS_emulator && window.EJS_emulator.api) {
            try {
                if (typeof window.EJS_emulator.api.setControllerPortDevice === "function") {
                    window.EJS_emulator.api.setControllerPortDevice(0, 1);
                    window.EJS_emulator.api.setControllerPortDevice(1, 1);
                }
            } catch (err){}
        }
    };

    if(!isLoaderScriptLoaded){
        const script = document.createElement("script");
        script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
        script.onload = function(){ isLoaderScriptLoaded = true; };
        document.head.appendChild(script);
    } else {
        if(typeof EJS_Emulator === "function"){
            new EJS_Emulator(document.getElementById("emulator"), window);
        } else {
            window.location.reload();
        }
    }
}

function forceCloseGame(){ window.location.reload(); }
</script>
</body>
</html>
