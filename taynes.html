<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Tay Cầm NES/SNES Pro - Trần Cường</title>
<style>
* { 
    box-sizing: border-box; 
    user-select: none; 
    -webkit-user-select: none; 
    touch-action: none;
}
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a0a0a; font-family: 'Segoe UI', Arial, sans-serif; }
body { display: flex; flex-direction: column; justify-content: space-between; padding: 8px 16px; position: relative; }

.header-status { width: 100%; display: flex; justify-content: space-between; align-items: center; color: #fff; font-size: 13px; height: 35px; border-bottom: 1px solid #c0392b; }
.status-dot { display: inline-block; width: 10px; height: 10px; background: #ff3366; border-radius: 50%; margin-right: 5px; }
.connected .status-dot { background: #00ffcc; box-shadow: 0 0 8px #00ffcc; }

/* Nút Vai L/R */
.shoulder-area { display: flex; justify-content: space-between; width: 100%; padding: 0 10px; }
.shoulder-btn { 
    width: 110px; 
    height: 40px; 
    background: linear-gradient(180deg, #5a3a3a, #3a2020); 
    border: 1px solid #c0392b; 
    color: #fff; 
    font-weight: bold; 
    font-size: 16px;
    border-radius: 20px 20px 8px 8px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    box-shadow: 0 5px 0px #2a1010, 0 6px 10px rgba(0,0,0,0.6);
    transition: all 0.05s ease;
    touch-action: manipulation;
}
.shoulder-btn:active, .shoulder-btn.active { 
    transform: translateY(4px);
    box-shadow: 0 1px 0px #2a1010, 0 2px 4px rgba(0,0,0,0.4);
    background: linear-gradient(180deg, #e74c3c, #c0392b);
    color: #ffcc00;
}

.gamepad-area { display: flex; justify-content: space-between; align-items: center; flex-grow: 1; width: 100%; margin-top: 10px; }

/* CỤM XOAY ANALOG JOYSTICK */
.joystick-container {
    position: relative;
    width: 160px;
    height: 160px;
    background: radial-gradient(circle, #2a1a1a 40%, #1a0a0a 100%);
    border: 4px solid #c0392b;
    border-radius: 50%;
    box-shadow: inset 0 6px 12px rgba(0,0,0,0.8), 0 4px 8px rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
}
.joystick-knob {
    position: absolute;
    width: 76px;
    height: 76px;
    background: radial-gradient(circle, #5a3a3a 0%, #3a2020 80%, #2a1010 100%);
    border: 2px solid #e74c3c;
    border-radius: 50%;
    box-shadow: 0 8px 16px rgba(0,0,0,0.7), inset 0 2px 4px rgba(255,255,255,0.2);
    cursor: pointer;
    transition: transform 0.05s ease;
}

.center-controls { display: flex; flex-direction: column; gap: 12px; align-items: center; }
.sys-btn { 
    background: linear-gradient(180deg, #3a2020, #2a1010); 
    border: 1px solid #c0392b; 
    color: #fff; 
    padding: 8px 16px; 
    border-radius: 20px; 
    font-size: 11px; 
    font-weight: bold; 
    text-align: center; 
    box-shadow: 0 4px 0px #1a0a0a, 0 4px 6px rgba(0,0,0,0.4); 
    width: 105px; 
    touch-action: manipulation;
}
.sys-btn:active, .sys-btn.active { 
    transform: translateY(3px);
    box-shadow: 0 1px 0px #1a0a0a, 0 1px 3px rgba(0,0,0,0.4);
    background: #ffcc00; 
    color: #000; 
}
.btn-scan { 
    background: linear-gradient(180deg, #ff416c, #ff4b2b); 
    color: #fff; 
    font-weight: bold; 
    border: 1px solid #fff; 
    width: 105px; 
    padding: 10px 12px; 
    border-radius: 8px; 
    box-shadow: 0 4px 0px #991b1b, 0 4px 8px rgba(0,0,0,0.4);
    touch-action: manipulation;
}
.btn-scan:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0px #991b1b, 0 1px 3px rgba(0,0,0,0.4);
}

/* CỤM NÚT SNES DIAMOND (Y, X, B, A) */
.snes-diamond { position: relative; width: 170px; height: 170px; }
.action-btn { 
    position: absolute; 
    width: 56px; 
    height: 56px; 
    border-radius: 50%; 
    font-size: 20px; 
    font-weight: bold; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    transition: all 0.05s ease;
    touch-action: manipulation;
}

/* Nút Y - TRÊN (Tím) */
.btn-y { 
    top: 0; left: 57px; 
    background: linear-gradient(180deg, #bb8fce, #7d3c98); 
    border: 2px solid #d7bde2; color: #fff; 
    box-shadow: 0 6px 0px #4a235a, 0 6px 12px rgba(0,0,0,0.5);
}   
/* Nút X - TRÁI (Xanh Dương) */
.btn-x { 
    top: 57px; left: 0; 
    background: linear-gradient(180deg, #5dade2, #2e86c1); 
    border: 2px solid #85c1e9; color: #fff; 
    box-shadow: 0 6px 0px #1b4f72, 0 6px 12px rgba(0,0,0,0.5);
}   
/* Nút B - PHẢI (Vàng Cam) */
.btn-b { 
    top: 57px; right: 0; 
    background: linear-gradient(180deg, #f8c471, #d35400); 
    border: 2px solid #fad7a0; color: #fff; 
    box-shadow: 0 6px 0px #7e5109, 0 6px 12px rgba(0,0,0,0.5);
}  
/* Nút A - DƯỚI (Đỏ) */
.btn-a { 
    bottom: 0; left: 57px; 
    background: linear-gradient(180deg, #f1948a, #cb4335); 
    border: 2px solid #f5b7b1; color: #fff; 
    box-shadow: 0 6px 0px #78281f, 0 6px 12px rgba(0,0,0,0.5);
} 

.action-btn:active, .action-btn.active { 
    transform: translateY(5px);
    box-shadow: 0 1px 0px #000, 0 2px 4px rgba(0,0,0,0.4);
    filter: brightness(1.2);
}

#floating-close-btn {
    position: absolute;
    top: 45px;
    left: 45%;
    width: 48px;
    height: 48px;
    background: linear-gradient(180deg, #ff5e62, #ff2525);
    border: 2px solid #ff9494;
    border-radius: 50%;
    color: white;
    font-size: 22px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 5px 0px #990000, 0 6px 10px rgba(0,0,0,0.5);
    z-index: 9999;
    cursor: move;
    transition: transform 0.05s ease;
}
#floating-close-btn:active { filter: brightness(1.1); }

#camera-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 99999; flex-direction: column; justify-content: center; align-items: center; }
#reader { width: 260px; height: 260px; background: #000; border: 2px solid #00ffcc; border-radius: 8px; overflow: hidden; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="header-status" id="status-bar">
    <div>🎮 THIẾT BỊ: <span style="color: #e74c3c; font-weight:bold;">NES/SNES Pro</span></div>
    <div id="status-text"><span class="status-dot"></span>Chưa liên kết. Bấm Quét QR!</div>
</div>

<div id="floating-close-btn">✕</div>

<div class="shoulder-area">
    <div class="shoulder-btn" data-key="u" data-keycode="85" data-code="KeyU">L</div>
    <div class="shoulder-btn" data-key="o" data-keycode="79" data-code="KeyO">R</div>
</div>

<div class="gamepad-area">
    <div class="joystick-container" id="joy-container">
        <div class="joystick-knob" id="joy-knob"></div>
    </div>

    <div class="center-controls">
        <button class="btn-scan" onclick="moCameraQuet()">📷 QUÉT QR</button>
        <div class="sys-btn" data-key="0" data-keycode="48" data-code="Digit0">SELECT (COIN)</div>
        <div class="sys-btn" data-key="9" data-keycode="57" data-code="Digit9">START</div>
    </div>

    <div class="snes-diamond">
        <div class="action-btn btn-y" data-key="c" data-keycode="67" data-code="KeyC">Y</div>
        <div class="action-btn btn-x" data-key="f" data-keycode="70" data-code="KeyF">X</div>
        <div class="action-btn btn-b" data-key="d" data-keycode="68" data-code="KeyD">B</div>
        <div class="action-btn btn-a" data-key="v" data-keycode="86" data-code="KeyV">A</div>
    </div>
</div>

<div id="camera-overlay">
    <div style="color: #00ffcc; margin-bottom: 15px; font-weight: bold;">ĐƯA CAMERA VÀO MÃ QR TRÊN PC</div>
    <div id="reader"></div>
    <div class="sys-btn" style="margin-top: 20px; background: #ff3366; width: 120px; padding: 10px;" onclick="dongCameraQuet()">ĐÓNG LẠI</div>
</div>

<script>
// === FIREBASE RTDB - KẾT NỐI ỔN ĐỊNH ===
const firebaseConfig = {
    databaseURL: "https://cuongdata-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

let html5QrcodeScanner = null;
let currentRoomId = null;
let roomRef = null;
let isConnected = false;
let keepAliveInterval = null;

function moCameraQuet() {
    document.getElementById("camera-overlay").style.display = "flex";
    html5QrcodeScanner = new Html5Qrcode("reader");
    html5QrcodeScanner.start(
        { facingMode: "environment" },
        { fps: 30, qrbox: { width: 200, height: 200 } },
        (qrText) => { 
            dongCameraQuet(); 
            ketNoiPhong(qrText.trim()); 
        },
        () => {}
    ).catch(() => {
        alert("Không mở được camera!");
        dongCameraQuet();
    });
}

function dongCameraQuet() {
    document.getElementById("camera-overlay").style.display = "none";
    if (html5QrcodeScanner) { html5QrcodeScanner.stop().catch(()=>{}); }
}

function ketNoiPhong(roomId) {
    const statusText = document.getElementById("status-text");
    statusText.innerText = `Đang kết nối phòng ${roomId}...`;
    
    currentRoomId = roomId;
    roomRef = database.ref(`game_rooms_nes_snes/${roomId}`);
    
    // Kiểm tra phòng tồn tại
    roomRef.once('value').then((snapshot) => {
        const roomData = snapshot.val();
        
        if (!roomData) {
            statusText.innerText = "❌ Phòng không tồn tại!";
            return;
        }
        
        // Đánh dấu player đã kết nối
        roomRef.update({ 
            playerConnected: true,
            lastActive: firebase.database.ServerValue.TIMESTAMP
        });
        
        statusText.innerHTML = "<span class='status-dot'></span>⚡ TAY CẦM SẴN SÀNG! ⚡";
        document.getElementById("status-bar").classList.add("connected");
        isConnected = true;
        
        // Cập nhật thời gian hoạt động mỗi 30 giây
        keepAliveInterval = setInterval(() => {
            if (roomRef) {
                roomRef.update({ lastActive: firebase.database.ServerValue.TIMESTAMP });
            }
        }, 30000);
        
        // Lắng nghe khi phòng bị xóa (host thoát)
        roomRef.on('value', (snapshot) => {
            if (!snapshot.exists() && isConnected) {
                statusText.innerHTML = "<span class='status-dot'></span>❌ Mất kết nối với máy chủ!";
                document.getElementById("status-bar").classList.remove("connected");
                isConnected = false;
                if (keepAliveInterval) clearInterval(keepAliveInterval);
            }
        });
        
    }).catch((err) => {
        console.error("Lỗi kết nối:", err);
        statusText.innerText = "❌ Lỗi kết nối!";
    });
}

// ===== GỬI LỆNH QUA FIREBASE CÓ TIMESTAMP =====
function guiLenhPhim(type, key, keyCode, code) {
    if (!isConnected || !currentRoomId) return;
    
    const commandRef = database.ref(`game_rooms_nes_snes/${currentRoomId}/commands`).push();
    commandRef.set({
        type: type,
        key: key,
        keyCode: parseInt(keyCode),
        code: code,
        timestamp: firebase.database.ServerValue.TIMESTAMP
    });
}

// XỬ LÝ TOUCH
const activeButtons = new Set();
function handleTouch(e) {
    const currentTouches = new Set();
    for (let i = 0; i < e.touches.length; i++) {
        const touch = e.touches[i];
        const element = document.elementFromPoint(touch.clientX, touch.clientY);
        if (element && (element.classList.contains('action-btn') || element.classList.contains('sys-btn') || element.classList.contains('shoulder-btn'))) {
            if (element.getAttribute('data-key')) currentTouches.add(element);
        }
    }
    activeButtons.forEach(btn => {
        if (!currentTouches.has(btn)) {
            btn.classList.remove('active');
            guiLenhPhim("keyup", btn.getAttribute('data-key'), btn.getAttribute('data-keycode'), btn.getAttribute('data-code'));
            activeButtons.delete(btn);
        }
    });
    currentTouches.forEach(btn => {
        if (!activeButtons.has(btn)) {
            btn.classList.add('active');
            guiLenhPhim("keydown", btn.getAttribute('data-key'), btn.getAttribute('data-keycode'), btn.getAttribute('data-code'));
            activeButtons.add(btn);
        }
    });
}

window.addEventListener('touchstart', handleTouch, { passive: false });
window.addEventListener('touchmove', handleTouch, { passive: false });
window.addEventListener('touchend', handleTouch, { passive: false });
window.addEventListener('touchcancel', handleTouch, { passive: false });



// JOYSTICK - Điều khiển cho Player 2 (dùng phím I, K, J, L)
const joyContainer = document.getElementById('joy-container');
const joyKnob = document.getElementById('joy-knob');
let joystickActive = false;
let joyTouchId = null;
const maxDistance = 40; 
// ĐỔI THÀNH PHÍM I, K, J, L (KHÔNG TRÙNG VỚI PLAYER 1)
let currentKeys = { i: false, k: false, j: false, l: false };

const keyMapJoy = {
    i: { key: "i", keyCode: 73, code: "KeyI" },     // LÊN
    k: { key: "k", keyCode: 75, code: "KeyK" },     // XUỐNG
    j: { key: "j", keyCode: 74, code: "KeyJ" },     // TRÁI
    l: { key: "l", keyCode: 76, code: "KeyL" }      // PHẢI
};

function updateJoystickKeys(targetKeys) {
    for (let k in currentKeys) {
        if (targetKeys[k] && !currentKeys[k]) {
            guiLenhPhim("keydown", keyMapJoy[k].key, keyMapJoy[k].keyCode, keyMapJoy[k].code);
            currentKeys[k] = true;
        } else if (!targetKeys[k] && currentKeys[k]) {
            guiLenhPhim("keyup", keyMapJoy[k].key, keyMapJoy[k].keyCode, keyMapJoy[k].code);
            currentKeys[k] = false;
        }
    }
}

joyContainer.addEventListener('touchstart', (e) => {
    if (joystickActive) return;
    const touch = e.changedTouches[0];
    joystickActive = true;
    joyTouchId = touch.identifier;
    moveJoystick(touch);
}, { passive: false });

window.addEventListener('touchmove', (e) => {
    if (!joystickActive) return;
    for (let i = 0; i < e.touches.length; i++) {
        if (e.touches[i].identifier === joyTouchId) {
            moveJoystick(e.touches[i]);
            break;
        }
    }
}, { passive: false });

window.addEventListener('touchend', (e) => {
    if (!joystickActive) return;
    for (let i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === joyTouchId) {
            joystickActive = false;
            joyTouchId = null;
            joyKnob.style.transform = `translate(0px, 0px)`;
            updateJoystickKeys({ i: false, k: false, j: false, l: false });
            break;
        }
    }
});

function moveJoystick(touch) {
    const rect = joyContainer.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    let deltaX = touch.clientX - centerX;
    let deltaY = touch.clientY - centerY;
    const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
    if (distance > maxDistance) {
        deltaX = (deltaX / distance) * maxDistance;
        deltaY = (deltaY / distance) * maxDistance;
    }
    joyKnob.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
    
    let nextKeys = { i: false, k: false, j: false, l: false };
    const threshold = 15; 
    if (distance > threshold) {
        const angle = Math.atan2(deltaY, deltaX) * (180 / Math.PI);
        // LÊN - I
        if (angle >= -120 && angle <= -60) nextKeys.i = true; 
        // XUỐNG - K
        else if (angle >= 60 && angle <= 120) nextKeys.k = true; 
        // PHẢI - L
        else if (angle >= -30 && angle <= 30) nextKeys.l = true; 
        // TRÁI - J
        else if (angle >= 150 || angle <= -150) nextKeys.j = true; 
        // CHẾCH
        else {
            if (angle > -60 && angle < -30) { nextKeys.i = true; nextKeys.l = true; }
            if (angle > -150 && angle < -120) { nextKeys.i = true; nextKeys.j = true; }
            if (angle > 30 && angle < 60) { nextKeys.k = true; nextKeys.l = true; }
            if (angle > 120 && angle < 150) { nextKeys.k = true; nextKeys.j = true; }
        }
    }
    updateJoystickKeys(nextKeys);
}



// NÚT ĐÓNG
(function() {
    const closeBtn = document.getElementById("floating-close-btn");
    let isDragging = false;
    let hasMoved = false;
    let startX, startY, startLeft, startTop;
    let btnTouchId = null;

    closeBtn.addEventListener("touchstart", (e) => {
        if (isDragging) return;
        const touch = e.changedTouches[0];
        isDragging = true;
        hasMoved = false;
        btnTouchId = touch.identifier;
        startX = touch.clientX;
        startY = touch.clientY;
        const rect = closeBtn.getBoundingClientRect();
        startLeft = rect.left;
        startTop = rect.top;
        closeBtn.style.transform = "scale(0.95) translateY(4px)";
        closeBtn.style.boxShadow = "0 1px 0px #000, 0 2px 4px rgba(0,0,0,0.4)";
    }, { passive: true });

    window.addEventListener("touchmove", (e) => {
        if (!isDragging) return;
        let targetTouch = null;
        for (let i = 0; i < e.touches.length; i++) {
            if (e.touches[i].identifier === btnTouchId) {
                targetTouch = e.touches[i];
                break;
            }
        }
        if (!targetTouch) return;
        
        const dx = targetTouch.clientX - startX;
        const dy = targetTouch.clientY - startY;

        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
            hasMoved = true;
        }

        if (hasMoved) {
            let newLeft = startLeft + dx;
            let newTop = startTop + dy;
            newLeft = Math.max(5, Math.min(window.innerWidth - closeBtn.offsetWidth - 5, newLeft));
            newTop = Math.max(5, Math.min(window.innerHeight - closeBtn.offsetHeight - 5, newTop));
            closeBtn.style.left = newLeft + "px";
            closeBtn.style.top = newTop + "px";
        }
    }, { passive: false });

    window.addEventListener("touchend", (e) => {
        if (!isDragging) return;
        for (let i = 0; i < e.changedTouches.length; i++) {
            if (e.changedTouches[i].identifier === btnTouchId) {
                isDragging = false;
                btnTouchId = null;
                closeBtn.style.transform = "none";
                closeBtn.style.boxShadow = "0 5px 0px #990000, 0 6px 10px rgba(0,0,0,0.5)";
                
                if (!hasMoved) {
                    if (roomRef) {
                        roomRef.update({ playerConnected: false });
                    }
                    if (keepAliveInterval) clearInterval(keepAliveInterval);
                    window.location.href = "index.html";
                }
                break;
            }
        }
    });
})();

// Ngắt kết nối khi đóng trang
window.addEventListener('beforeunload', () => {
    if (roomRef) {
        roomRef.update({ playerConnected: false });
    }
    if (keepAliveInterval) {
        clearInterval(keepAliveInterval);
    }
});

document.documentElement.addEventListener('touchstart', (e) => {
    if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

// Chặn các phím tắt và menu chuột phải
document.addEventListener('contextmenu', function(e) { e.preventDefault(); }, false);
document.addEventListener('selectstart', function(e) { e.preventDefault(); });
document.addEventListener('keydown', function(e) {
    if (e.keyCode === 123) { e.preventDefault(); }
    if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) { e.preventDefault(); }
    if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); }
    if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 65)) { e.preventDefault(); }
});
</script>
</body>
</html>
